# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = db/migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with main.py
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion to sqlalchemy Types
# sqlalchemy.type_conversion_guide =

# version location specification
# version_locations = db/migrations/versions

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
